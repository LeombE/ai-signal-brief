name: Daily AI Report

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

permissions:
  contents: read

concurrency:
  group: daily-ai-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-send:
    name: Build and send Telegram report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONPATH: src
      REPORT_TZ: Asia/Kuala_Lumpur
      REPORT_MAX_ITEMS: "10"
      REPORT_LOOKBACK_HOURS: "48"
      REPORT_MIN_FRESH_ITEMS: "3"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project safely
        run: python -m pip install --no-deps --ignore-requires-python --no-build-isolation -e .

      - name: Run smoke checks before delivery
        run: |
          python -m compileall src
          python -m ai_signal_brief --version
          python -m ai_signal_brief doctor
          python -m ai_signal_brief public-readiness
          python -m unittest discover -s tests

      - name: Resolve Malaysia report date
        run: |
          report_date="$(TZ=Asia/Kuala_Lumpur date +%F)"
          echo "REPORT_DATE=${report_date}" >> "$GITHUB_ENV"
          echo "REPORT_OUT=outputs/daily-reports/${report_date}-live" >> "$GITHUB_ENV"

      - name: Check Telegram secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::Missing required GitHub secret TELEGRAM_BOT_TOKEN"
            exit 1
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::Missing required GitHub secret TELEGRAM_CHAT_ID"
            exit 1
          fi

      - name: Build report and send once if ready
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          send_guard="$RUNNER_TEMP/daily-ai-report-telegram-send-attempted"
          if [ -e "$send_guard" ]; then
            echo "::error::Telegram send was already attempted in this workflow run"
            exit 1
          fi
          touch "$send_guard"
          python -m ai_signal_brief build-daily-ai-report \
            --date "$REPORT_DATE" \
            --timezone Asia/Kuala_Lumpur \
            --out "$REPORT_OUT" \
            --format markdown,json,docx \
            --english-only \
            --no-openai \
            --max-items 10 \
            --lookback-hours 48 \
            --min-fresh-items 3 \
            --send-telegram

      - name: Upload generated report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-ai-report-${{ github.run_id }}
          path: |
            outputs/daily-reports/*-live/report.json
            outputs/daily-reports/*-live/report.md
            outputs/daily-reports/*-live/report.docx
          retention-days: 14
          if-no-files-found: warn